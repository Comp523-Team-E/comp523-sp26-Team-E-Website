<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Midterm Presentation</title>
    <link rel="stylesheet" href="../styles.css" />
</head>
<body>
    <!-- Navigation (rendered by initNav() in script.js) -->
    <nav class="navbar" id="main-nav" data-nav-root=".."></nav>

    <!-- Page Header -->
    <section class="hero">
        <div class="container">
            <h1 class="hero-title">Midterm Presentation</h1>
            <p class="hero-subtitle">Midterm Assignment</p>
        </div>
    </section>

    <!-- Embedded Presentation -->
    <section class="section">
        <div class="container">
            <h2 class="section-title">Midterm Presentation</h2>

            <div class="weekly-reports-block">
                <div style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-bottom: 1.25rem;">
                    <a class="btn btn-primary" href="https://docs.google.com/presentation/d/16efX3i3ABLuzmbwipPgwpwtAkl2BwScgnrcdMrLJP6c/edit" target="_blank" rel="noopener noreferrer">
                        Open Full Presentation
                    </a>
                    <a class="btn" href="../index.html#assignments" style="background: var(--bg-light); color: var(--secondary-color); border: 1px solid var(--border-color);">
                        Back to Assignments
                    </a>
                </div>

                <div style="border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); background: var(--bg-white);">
                    <iframe
                        src="https://docs.google.com/presentation/d/16efX3i3ABLuzmbwipPgwpwtAkl2BwScgnrcdMrLJP6c/embed?start=false&loop=false&delayms=3000"
                        title="Midterm Presentation"
                        style="width: 100%; height: 80vh; border: 0;"
                        loading="lazy"
                        allowfullscreen="true"
                        mozallowfullscreen="true"
                        webkitallowfullscreen="true"
                    ></iframe>
                </div>

                <p style="margin-top: 1rem; text-align:center; color: var(--text-light);">
                    If the presentation does not display, open it directly:
                    <a href="https://docs.google.com/presentation/d/16efX3i3ABLuzmbwipPgwpwtAkl2BwScgnrcdMrLJP6c/edit" target="_blank" rel="noopener noreferrer" style="color: var(--primary-color); font-weight: 700; text-decoration: none;">
                        View Presentation
                    </a>
                </p>
            </div>
        </div>
    </section>

    <script src="../script.js"></script>
</body>
</html>
